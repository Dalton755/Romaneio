<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ruas da Rota</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:12px;
}

.topo{

position:sticky;
top:0;

z-index:999;

background:white;

padding:12px;

margin-bottom:20px;

border-radius:16px;

box-shadow:
0 2px 10px rgba(0,0,0,.1);

}

.status{

display:flex;
gap:10px;

margin-bottom:10px;

}

.box{

flex:1;

padding:10px;

text-align:center;

background:#f5f5f5;

border-radius:12px;

}

.valor{

font-size:24px;
font-weight:bold;

}

.pesquisa{

display:flex;
gap:10px;

position:relative;

}

#abrirPesquisa{

border:none;
background:#4caf50;

color:white;

padding:10px;

border-radius:12px;

font-size:20px;

cursor:pointer;

}

#busca{

display:none;

flex:1;

padding:10px;

border:1px solid #ddd;

border-radius:12px;

}

#sugestoes{

position:absolute;

top:55px;

left:50px;
right:0;

background:white;

border-radius:12px;

overflow:hidden;

box-shadow:
0 4px 12px rgba(0,0,0,.15);

display:none;

max-height:250px;

overflow-y:auto;

}

.sugestao{

padding:12px;

cursor:pointer;

border-bottom:1px solid #eee;

}

.rua{

background:white;

padding:16px;

margin-bottom:20px;

border-radius:16px;

box-shadow:
0 2px 10px rgba(0,0,0,.08);

}

.finalizada{

background:#dff7df;

}

.finalizada .titulo{

text-decoration:line-through;
color:#2e7d32;

}

.titulo{

font-size:20px;
font-weight:bold;

}

.parada{

color:#666;
margin-bottom:15px;

}

.grid{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:10px;

}

@media(max-width:700px){

.grid{

grid-template-columns:
repeat(2,1fr);

}

}

.card{

padding:12px;

border-radius:12px;

background:#f7f7f7;

border:1px solid #ddd;

}

.card.concluida{

background:#dff7df;

border-color:#4caf50;

}

.numero{

font-size:22px;
font-weight:bold;

}

.pacote{

margin-bottom:8px;

font-weight:bold;

}

.complemento{

font-size:13px;
color:#666;

margin-top:8px;

margin-bottom:10px;

}

.check{

width:22px;
height:22px;

}

</style>

</head>

<body>

<div class="topo">

<div class="status">

<div class="box">

<div id="entregues" class="valor">0</div>

<small>Entregues</small>

</div>

<div class="box">

<div id="pendentes" class="valor">0</div>

<small>Pendentes</small>

</div>

</div>

<div class="pesquisa">

<button id="abrirPesquisa">
🔍
</button>

<input
id="busca"
placeholder="Rua, número ou pacote..."
>

<div id="sugestoes"></div>

</div>

</div>

<div id="app"></div>


<script>

const API_URL=
"https://script.google.com/macros/s/AKfycbwQqDh-WiG_-EHlSrL-v00dvmnd06opKj9Dns7nlCTNn-jgVfhlXIgTwakURHUZHRlegA/exec";

let dados=[];
let lista=[];

async function carregarDados(){

const response=
await fetch(API_URL);

dados=
await response.json();

lista=[];

const app=
document.getElementById("app");

app.innerHTML="";

const agrupado={};

dados.forEach(item=>{

if(!agrupado[item.rua]){

agrupado[item.rua]=[];

}

agrupado[item.rua]
.push(item);

[
item.rua,
item.numero,
"Pacote "+item.sequence

]

.forEach(valor=>{

if(!valor)return;

lista.push({

texto:valor,
item:item

});

});

});

Object.keys(agrupado)

.sort((a,b)=>{

return agrupado[a][0].stop-
agrupado[b][0].stop

})

.forEach(rua=>{

const ruaDiv=
document.createElement(
"div"
);

ruaDiv.className=
"rua";

ruaDiv.innerHTML=`

<div class=titulo>

${rua}

</div>

<div class=parada>

Parada
${agrupado[rua][0].stop}

</div>

<div class=grid>

</div>

`;

const grid=
ruaDiv.querySelector(
".grid"
);

agrupado[rua]

.sort((a,b)=>{

return(
parseInt(a.numero)||0
)
-
(
parseInt(b.numero)||0
)

})

.forEach(item=>{

const card=
document.createElement(
"div"
);

card.className=
"card";

card.innerHTML=`

<div class=pacote>

Pacote
${item.sequence}

</div>

<div class=numero>

${item.numero||"-"}

</div>

<div class=complemento>

${item.complemento||""}

</div>

<input
type=checkbox
class=check
>

`;

const checkbox=
card.querySelector(
".check"
);

checkbox.addEventListener(
"change",
()=>{

card.classList.toggle(
"concluida"
);

const total=
ruaDiv.querySelectorAll(
".check"
);

const marcados=
ruaDiv.querySelectorAll(
".check:checked"
);

ruaDiv.classList.toggle(
"finalizada",
total.length===marcados.length
);

atualizarStatus();

}

);

grid.appendChild(card);

});

app.appendChild(
ruaDiv
);

});

atualizarStatus();

}

const busca=
document.getElementById(
"busca"
);

const abrir=
document.getElementById(
"abrirPesquisa"
);

const sugestoes=
document.getElementById(
"sugestoes"
);

abrir.onclick=()=>{

const visivel=
getComputedStyle(
busca
).display;

busca.style.display=

visivel==="none"
?"block"
:"none";

if(
busca.style.display==="block"
){

busca.focus();

}

};

busca.addEventListener(
"input",
()=>{

const termo=
busca.value
.toLowerCase();

sugestoes.innerHTML="";

if(!termo){

sugestoes.style.display=
"none";

return;

}

lista

.filter(x=>

x.texto
.toLowerCase()
.includes(
termo
)

)

.slice(0,10)

.forEach(x=>{

const div=
document.createElement(
"div"
);

div.className=
"sugestao";

div.innerText=
x.texto;

div.onclick=()=>{

buscar(x.item);

};

sugestoes.appendChild(
div
);

});

sugestoes.style.display=
"block";

});

function buscar(item){

document
.querySelectorAll(
".rua"
)

.forEach(card=>{

if(

card.innerText
.includes(
item.rua
)

){

card.scrollIntoView({

behavior:
"smooth",

block:
"center"

});

card.style.boxShadow=

"0 0 20px #4caf50";

setTimeout(()=>{

card.style.boxShadow=
"";

},2000);

}

});

sugestoes.style.display=
"none";

}

busca.addEventListener(
"keypress",
e=>{

if(
e.key==="Enter"
){

const primeiro=
lista[0];

if(primeiro){

buscar(
primeiro.item
);

}

}

});

function atualizarStatus(){

const total=
document.querySelectorAll(
".check"
).length;

const entregues=
document.querySelectorAll(
".check:checked"
).length;

document.getElementById(
"entregues"
).innerText=
entregues;

document.getElementById(
"pendentes"
).innerText=
total-entregues;

}

carregarDados();

</script>

</body>
</html>
