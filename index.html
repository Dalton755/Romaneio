<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Rota</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
padding:12px;
}

.topo{

position:sticky;
top:0;
z-index:999;

background:white;

padding:12px;

margin-bottom:15px;

border-radius:16px;

box-shadow:
0 2px 10px rgba(0,0,0,.1);

}

.status{

display:flex;
gap:10px;

margin-bottom:10px;

}

.box{

flex:1;

padding:10px;

background:#f5f5f5;

border-radius:12px;

text-align:center;

}

.valor{

font-size:25px;
font-weight:bold;

}

.pesquisa{

display:flex;
gap:10px;

position:relative;

}

#abrirPesquisa{

border:none;
background:#4caf50;

color:white;

padding:10px;

border-radius:12px;

font-size:20px;

}

#busca{

display:none;

flex:1;

padding:10px;

border-radius:12px;

border:1px solid #ddd;

}

#sugestoes{

position:absolute;

top:55px;
left:50px;
right:0;

background:white;

border-radius:12px;

display:none;

max-height:250px;

overflow:auto;

box-shadow:
0 4px 12px rgba(0,0,0,.15);

}

.sugestao{

padding:12px;

cursor:pointer;

border-bottom:1px solid #eee;

}

.rua{

background:white;

padding:15px;

margin-bottom:20px;

border-radius:16px;

}

.finalizada{

background:#dff7df;

}

.titulo{

font-size:20px;
font-weight:bold;

}

.parada{

margin-bottom:15px;
color:#666;

}

.grid{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:10px;

}

.card{

padding:12px;

border-radius:12px;

background:#f7f7f7;

border:1px solid #ddd;

}

.card.concluida{

background:#dff7df;

}

.numero{

font-size:24px;
font-weight:bold;

}

.check{

margin-top:10px;
width:22px;
height:22px;

}

@media(max-width:700px){

.grid{

grid-template-columns:
repeat(2,1fr);

}

}

 .obs{

margin:10px 0;

padding:8px;

background:#fff6d5;

border-radius:8px;

font-size:13px;

color:#555;

min-height:20px;

}

</style>

</head>

<body>

<div class="topo">

<div class="status">

<div class="box">

<div
id="entregues"
class="valor"
>0</div>

<small>
Entregues
</small>

</div>

<div class="box">

<div
id="pendentes"
class="valor"
>0</div>

<small>
Pendentes
</small>

</div>

</div>

<div class="pesquisa">

<button id="abrirPesquisa">

🔍

</button>

<input
id="busca"
placeholder=
"Rua, número ou pacote..."
>

<div
id="sugestoes"
></div>

</div>

</div>

<div id="app"></div>

<script>

const API_URL=
"https://script.google.com/macros/s/AKfycbwMfuoQqu0xUHbCZSud9erXnx-9-sYH5MdMugA1gBBsC44Da0e3FA99AsWPV6RkFiPAug/exec";

let dados=[];
let lista=[];

async function carregarDados(){

const response=
await fetch(API_URL);

dados=
await response.json();

 ultimoEstado=
JSON.stringify(

dados.map(x=>({

sequence:x.sequence,
status:x.status

}))

); 

lista=[];

const app=
document.getElementById(
"app"
);

app.innerHTML="";

const agrupado={};

dados.forEach(item=>{

if(!agrupado[item.rua]){

agrupado[item.rua]=[];

}

agrupado[item.rua]
.push(item);

[
item.rua,
item.numero,
"Pacote "+item.sequence
]

.forEach(x=>{

if(!x)return;

lista.push({

texto:x,
item:item

});

});

});

Object.keys(
agrupado
)

.forEach(rua=>{

const ruaDiv=
document.createElement(
"div"
);

ruaDiv.className=
"rua";

ruaDiv.innerHTML=`

<div class=titulo>

${rua}

</div>

<div class=parada>

Parada
${agrupado[rua][0].stop}

</div>

<div class=grid>

</div>

`;

const grid=
ruaDiv.querySelector(
".grid"
);

const casas={};

agrupado[rua]

.forEach(item=>{

if(
!casas[item.numero]
){

casas[
item.numero
]=[];

}

casas[
item.numero
]

.push(item);

});


Object
.keys(casas)

.sort(
(a,b)=>

parseInt(a)
-
parseInt(b)

)

.forEach(numero=>{

const itens=
casas[numero];

const card=
document.createElement(
"div"
);

card.className=
"card";

card.dataset.qtd=
itens.length;

card.style.gridColumn=
`span ${
Math.min(
itens.length,
4
)
}`;



let enderecoCompleto=
item.rua+
","+
numero;

let html=`

<div class=numero>

${numero}

</div>

<div
class=obs
>

${itens[0]
.observacao||""}

</div>

<div style="
display:grid;
grid-template-columns:
repeat(
${itens.length},
1fr);
gap:10px;
">

`;

itens.forEach(item=>{

html+=`

<div>

Pac
${item.sequence}

<br>

${item.complemento||""}

</div>

`;

});

html+=`

</div>

<input
class=check
type=checkbox
${itens.every(
x=>
x.status==="Entregue"
)
?"checked":""}
>

`;

card.innerHTML=
html;

 const obsDiv=
card.querySelector(
".obs"
);

card.addEventListener(
"dblclick",
()=>{

const textoAtual=
obsDiv.innerText;

obsDiv.innerHTML=`

<input
id=tempObs
style="
width:100%;
padding:8px;
border-radius:8px;
border:1px solid #ddd;
"
value="${textoAtual}"
>

`;

const input=
document.getElementById(
"tempObs"
);

input.focus();

input.addEventListener(
"keypress",
async e=>{

if(
e.key==="Enter"
){

const texto=
input.value;

obsDiv.innerText=
texto;

await fetch(

API_URL+
"?action=obs",

{

method:"POST",

body:
JSON.stringify({

endereco:
enderecoCompleto,

obs:texto

})

}

);

}

}

);

});

const check=
card.querySelector(
".check"
);

if(
check.checked
){

card.classList.add(
"concluida"
);

}

check.addEventListener(
"change",
async()=>{

// se estiver desmarcando
if(!check.checked){

const confirmar=
confirm(
"Deseja realmente desfazer esta entrega?"
);

if(!confirmar){

check.checked=true;
return;

}

}

await Promise.all(

itens.map(
item=>

fetch(
API_URL,
{

method:"POST",

body:JSON.stringify({

sequence:item.sequence,

entregue:check.checked

})

}

)

)

);

// aplicar visual
card.classList.toggle(
"concluida",
check.checked
);


// verificar rua inteira
const total=
ruaDiv.querySelectorAll(
".check"
);

const marcados=
ruaDiv.querySelectorAll(
".check:checked"
);

ruaDiv.classList.toggle(
"finalizada",
total.length===marcados.length
);

atualizarStatus();

}
);

grid.appendChild(
card
);

});

app.appendChild(
ruaDiv
);

});

atualizarStatus();

}

function atualizarStatus(){

let total=0;
let entregues=0;

document
.querySelectorAll(
".card"
)

.forEach(card=>{

const qtd=
parseInt(
card.dataset.qtd
);

total+=qtd;

if(
card.querySelector(
".check"
).checked
){

entregues+=qtd;

}

});

document
.getElementById(
"entregues"
)
.innerText=
entregues;

document
.getElementById(
"pendentes"
)
.innerText=
total-entregues;

}

carregarDados();

// guarda última versão recebida
let ultimoEstado="";

// atualização automática
setInterval(
atualizarTempoReal,
3000
);


async function atualizarTempoReal(){

try{

const response=
await fetch(
API_URL+
"?t="+Date.now()
);

const novosDados=
await response.json();

const estadoAtual=
JSON.stringify(

novosDados.map(x=>({

sequence:x.sequence,
status:x.status

}))

);


// só atualiza se houve alteração
if(
estadoAtual!==ultimoEstado
){

ultimoEstado=
estadoAtual;


// salva posição atual da tela
const scrollAtual=
window.scrollY;


// reconstruir
dados=novosDados;

await carregarDados();


// voltar para mesma posição
window.scrollTo({

top:scrollAtual

});

}

}catch(e){

console.log(
"Erro atualização:",
e
);

}

}

</script>

</body>

</html>
