<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ruas da Rota</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
      padding:12px;
      color:#222;
    }

    .rua{
      background:#fff;
      border-radius:16px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
      transition:.3s;
    }

    .rua.finalizada{
      background:#dff7df;
      opacity:.8;
    }

    .rua.finalizada .titulo-rua{
      text-decoration:line-through;
      color:#2e7d32;
    }

    .titulo-rua{
      font-size:20px;
      font-weight:bold;
      margin-bottom:12px;
    }

    .casa{
      border:1px solid #e5e5e5;
      border-radius:12px;
      padding:12px;
      margin-bottom:10px;
      transition:.3s;
    }

    .casa.concluida{
      background:#dff7df;
      border-color:#4caf50;
    }

    .numero{
      font-size:22px;
      font-weight:bold;
      margin-bottom:6px;
    }

    .pacote{
      font-size:16px;
      color:#444;
      margin-bottom:4px;
    }

    .complemento{
      font-size:14px;
      color:#777;
      margin-bottom:10px;
    }

    .check{
      width:24px;
      height:24px;
      cursor:pointer;
    }

    .sequence{
      font-size:12px;
      color:#999;
      margin-bottom:8px;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>

const API_URL="COLE_SUA_URL_APPS_SCRIPT_AQUI";

async function carregarDados(){

try{

const response=await fetch(API_URL);

const dados=await response.json();

const app=document.getElementById("app");

app.innerHTML="";

const agrupado={};

// agrupar ruas
dados.forEach(item=>{

if(!agrupado[item.rua]){
agrupado[item.rua]=[];
}

agrupado[item.rua].push(item);

});


// ordenar ruas pela menor sequence
const ruasOrdenadas=Object.keys(agrupado)
.sort((a,b)=>{

return agrupado[a][0].sequence-
agrupado[b][0].sequence

});

ruasOrdenadas.forEach(nomeRua=>{

const ruaDiv=document.createElement("div");
ruaDiv.className="rua";

ruaDiv.innerHTML=`
<div class="titulo-rua">
${nomeRua}
</div>
`;

agrupado[nomeRua]
.sort((a,b)=>a.sequence-b.sequence)
.forEach(casa=>{

const card=document.createElement("div");

card.className="casa";

card.innerHTML=`

<div class="sequence">
Parada ${casa.sequence}
</div>

<div class="numero">
${casa.numero||"-"}
</div>

<div class="pacote">
Pacote ${casa.stop}
</div>

<div class="complemento">
${casa.complemento||""}
</div>

<input class="check" type="checkbox">

`;

const checkbox=
card.querySelector(".check");

checkbox.addEventListener("change",()=>{

card.classList.toggle(
"concluida"
);

const total=
ruaDiv.querySelectorAll(".check");

const marcadas=
ruaDiv.querySelectorAll(
".check:checked"
);

if(total.length===marcadas.length){

ruaDiv.classList.add(
"finalizada"
);

}else{

ruaDiv.classList.remove(
"finalizada"
);

}

});

ruaDiv.appendChild(card);

});

app.appendChild(ruaDiv);

});

}catch(erro){

document.body.innerHTML=
`Erro: ${erro}`;

}

}

carregarDados();

</script>
</body>
</html>
