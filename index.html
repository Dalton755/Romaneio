<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ruas da Rota</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
      padding:12px;
      color:#222;
    }

  .rua{

background:#fff;
padding:16px;
border-radius:16px;
margin-bottom:20px;

box-shadow:
0 2px 10px rgba(0,0,0,.08);

}

.titulo-rua{

font-size:20px;
font-weight:bold;
margin-bottom:5px;

}

.parada{

font-size:14px;
color:#666;
margin-bottom:15px;

}

.grid{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:10px;

}

@media(max-width:700px){

.grid{

grid-template-columns:
repeat(2,1fr);

}

}

.pacote-card{

padding:12px;

border-radius:12px;

background:#f7f7f7;

border:1px solid #ddd;

transition:.3s;

}

.pacote-card.concluida{

background:#dff7df;
border-color:#4caf50;

}

.numero{

font-size:22px;
font-weight:bold;

}

.pacote{

margin-top:6px;
font-weight:bold;

}

.complemento{

font-size:13px;
color:#666;
margin-top:8px;

}

.check{

margin-top:10px;
width:22px;
height:22px;

cursor:pointer;

}

.finalizada{

background:#dff7df;

}

.finalizada .titulo-rua{

text-decoration:line-through;
color:#2e7d32;

}
.topo{

position:sticky;

top:0;

z-index:999;

background:white;

padding:10px;

margin-bottom:15px;

border-radius:16px;

box-shadow:
0 2px 10px rgba(0,0,0,.1);

}

.status{

display:flex;
gap:10px;

margin-bottom:10px;

}

.box-status{

flex:1;

text-align:center;

padding:8px;

background:#f5f5f5;

border-radius:12px;

}

.box-status div{

font-size:25px;
font-weight:bold;

}

.pesquisa{

display:flex;
gap:10px;

}

#busca{

display:none;

flex:1;

padding:10px;

border:1px solid #ddd;

border-radius:12px;

}

#abrirPesquisa{

border:none;

background:#4caf50;

color:white;

border-radius:12px;

padding:10px;

font-size:20px;

cursor:pointer;

}

.busca-container{

position:relative;
flex:1;

}

#sugestoes{

position:absolute;

top:100%;
left:0;
right:0;

background:white;

border-radius:12px;

box-shadow:
0 4px 12px rgba(0,0,0,.15);

max-height:250px;

overflow-y:auto;

display:none;

z-index:9999;

}

.sugestao{

padding:12px;

border-bottom:1px solid #eee;

cursor:pointer;

}

.sugestao:hover{

background:#f5f5f5;

}    
    
  </style>
</head>

<body>

  <div class="topo">

<div class="status">

<div class="box-status">
<div id="entregues">0</div>
<small>Entregues</small>
</div>

<div class="box-status">
<div id="pendentes">0</div>
<small>Pendentes</small>
</div>

</div>

<div class="pesquisa">

<button id="abrirPesquisa">

🔍

</button>

<div class="busca-container">

<input
type="text"
id="busca"
placeholder="Rua, número ou pacote..."
autocomplete="off"
>

<div id="sugestoes"></div>

</div>

</div>

</div>

<div id="app"></div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwQqDh-WiG_-EHlSrL-v00dvmnd06opKj9Dns7nlCTNn-jgVfhlXIgTwakURHUZHRlegA/exec";

async function carregarDados(){

try{

const response=await fetch(API_URL);

const dados=await response.json();

const app=document.getElementById("app");

app.innerHTML="";

const agrupado={};

// agrupar ruas
dados.forEach(item=>{

if(!agrupado[item.rua]){
agrupado[item.rua]=[];
}

agrupado[item.rua].push(item);

});


// ordenar ruas pela menor sequence
const ruasOrdenadas=Object.keys(agrupado)
.sort((a,b)=>{

return agrupado[a][0].sequence-
agrupado[b][0].sequence

});

ruasOrdenadas.forEach(nomeRua=>{

const ruaDiv=document.createElement("div");

ruaDiv.className="rua";

const parada=
agrupado[nomeRua][0].stop;

ruaDiv.innerHTML=`

<div class="titulo-rua">
${nomeRua}
</div>

<div class="parada">
Parada ${parada}
</div>

<div class="grid"></div>

`;

const grid=
ruaDiv.querySelector(".grid");

agrupado[nomeRua]

.sort((a,b)=>{

const n1=parseInt(a.numero)||0;
const n2=parseInt(b.numero)||0;

return n1-n2;

})

.forEach(item=>{

const card=
document.createElement("div");

card.className=
"pacote-card";

card.innerHTML=`

<div class="pacote">
Pacote ${item.sequence}
</div>

<div class="numero">
${item.numero||"-"}
</div>

<div class="complemento">
${item.complemento||""}
</div>

<input
type="checkbox"
class="check"
>

`;

const checkbox=
card.querySelector(".check");

checkbox.addEventListener(
"change",
()=>{

card.classList.toggle(
"concluida"
);

const total=
ruaDiv.querySelectorAll(".check");

const marcados=
ruaDiv.querySelectorAll(
".check:checked"
);

if(
total.length===
marcados.length
){

ruaDiv.classList.add(
"finalizada"
);

}else{

ruaDiv.classList.remove(
"finalizada"
);

}

}
);

grid.appendChild(card);

});

app.appendChild(ruaDiv);

});

}catch(erro){

document.body.innerHTML=
`Erro: ${erro}`;

}

}

carregarDados();

const busca=
document.getElementById(
"busca"
);

const abrir=
document.getElementById(
"abrirPesquisa"
);

const sugestoes=
document.getElementById(
"sugestoes"
);

let listaPesquisa=[];


// montar índice
dados.forEach(item=>{

[
item.rua,
item.numero,
"Pacote "+item.sequence

].forEach(valor=>{

if(!valor)return;

listaPesquisa.push({

texto:valor.toString(),
item:item

});

});

});



abrir.onclick=()=>{

busca.style.display=
busca.style.display==="block"
?"none"
:"block";

if(
busca.style.display==="block"
){

busca.focus();

}

};




// digitação
busca.addEventListener(
"input",
()=>{

const termo=
busca.value
.toLowerCase();

sugestoes.innerHTML="";

if(
termo.length===0
){

sugestoes.style.display=
"none";

return;

}


const encontrados=
listaPesquisa.filter(x=>

x.texto
.toLowerCase()
.includes(termo)

)

.slice(0,10);


encontrados.forEach(resultado=>{

const div=
document.createElement(
"div"
);

div.className=
"sugestao";

div.innerText=
resultado.texto;

div.onclick=()=>{

buscarElemento(
resultado.item
);

busca.value=
resultado.texto;

sugestoes.style.display=
"none";

};

sugestoes.appendChild(
div
);

});

sugestoes.style.display=
encontrados.length
?"block"
:"none";

});




// localizar
function buscarElemento(item){

let encontrado=null;

document
.querySelectorAll(".rua")

.forEach(card=>{

if(encontrado)return;

const texto=
card.innerText
.toLowerCase();

if(

texto.includes(
item.rua.toLowerCase()
)

){

encontrado=card;

}

});

if(encontrado){

encontrado.scrollIntoView({

behavior:"smooth",
block:"center"

});

encontrado.style.boxShadow=
"0 0 20px #4caf50";

setTimeout(()=>{

encontrado.style.boxShadow=
"";

},2000);

}

}


// enter
busca.addEventListener(
"keypress",
e=>{

if(
e.key==="Enter"
){

const primeiro=
listaPesquisa.find(x=>

x.texto
.toLowerCase()
.includes(

busca.value
.toLowerCase()

)

);

if(primeiro){

buscarElemento(
primeiro.item
);

}

}

});

</script>
</body>
</html>
