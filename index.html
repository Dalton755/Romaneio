<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Rota</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:12px;
}

.topo{

position:sticky;
top:0;
z-index:999;

background:white;

padding:12px;

margin-bottom:15px;

border-radius:16px;

box-shadow:
0 2px 10px rgba(0,0,0,.1);

}

.status{

display:flex;
gap:10px;

margin-bottom:10px;

}

.box{

flex:1;

padding:10px;

text-align:center;

background:#f5f5f5;

border-radius:12px;

}

.valor{

font-size:24px;
font-weight:bold;

}

.pesquisa{

display:flex;
gap:10px;

position:relative;

}

#abrirPesquisa{

border:none;
background:#4caf50;

color:white;

padding:10px;

border-radius:12px;

font-size:20px;

cursor:pointer;

}

#busca{

display:none;

flex:1;

padding:10px;

border-radius:12px;

border:1px solid #ddd;

}

#sugestoes{

position:absolute;

top:55px;
left:50px;
right:0;

background:white;

border-radius:12px;

display:none;

max-height:250px;

overflow:auto;

box-shadow:
0 4px 12px rgba(0,0,0,.15);

}

.sugestao{

padding:12px;

cursor:pointer;

border-bottom:1px solid #eee;

}

.rua{

background:white;

padding:15px;

margin-bottom:20px;

border-radius:16px;

box-shadow:
0 2px 10px rgba(0,0,0,.08);

}

.finalizada{

background:#dff7df;

}

.finalizada .titulo{

text-decoration:line-through;

color:#2e7d32;

}

.titulo{

font-size:20px;
font-weight:bold;

}

.parada{

margin-bottom:15px;
color:#666;

}

.grid{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:10px;

}

.card{

padding:12px;

border-radius:12px;

background:#f7f7f7;

border:1px solid #ddd;

transition:.3s;

}

.card.concluida{

background:#dff7df;

border-color:#4caf50;

}

.numero{

font-size:24px;
font-weight:bold;

margin-bottom:10px;

}

.pacotes{

display:grid;

gap:10px;

margin-bottom:10px;

}

.pacote{

background:white;

padding:8px;

border-radius:8px;

font-size:14px;

}

.obs{

margin:10px 0;

padding:8px;

background:#fff6d5;

border-radius:8px;

font-size:13px;

color:#555;

min-height:20px;

}

.check{

margin-top:10px;

width:22px;
height:22px;

cursor:pointer;

}

@media(max-width:700px){

.grid{

grid-template-columns:
repeat(2,1fr);

}

}

</style>

</head>

<body>

<div class="topo">

<div class="status">

<div class="box">

<div id="entregues"
class="valor">0</div>

<small>Entregues</small>

</div>

<div class="box">

<div id="pendentes"
class="valor">0</div>

<small>Pendentes</small>

</div>

</div>

<div class="pesquisa">

<button id="abrirPesquisa">
🔍
</button>

<input
id="busca"
placeholder="Rua, número ou pacote..."
autocomplete="off"
>

<div id="sugestoes"></div>

</div>

</div>

<div id="app"></div>

<script>

const API_URL=
"https://script.google.com/macros/s/AKfycbwMfuoQqu0xUHbCZSud9erXnx-9-sYH5MdMugA1gBBsC44Da0e3FA99AsWPV6RkFiPAug/exec";

let dados=[];
let lista=[];
let ultimoEstado="";

async function carregarDados(){

const response=
await fetch(
API_URL+
"?t="+Date.now()
);

dados=
await response.json();

ultimoEstado=
JSON.stringify(

dados.map(x=>({

sequence:x.sequence,
status:x.status,
observacao:x.observacao

}))

);

lista=[];

const app=
document.getElementById(
"app"
);

app.innerHTML="";

const agrupado={};

dados.forEach(item=>{

if(!agrupado[item.rua]){

agrupado[item.rua]=[];

}

agrupado[item.rua]
.push(item);

[
item.rua,
item.numero,
"Pacote "+item.sequence
]

.forEach(x=>{

if(!x)return;

lista.push({

texto:x.toString(),
item:item

});

});

});

Object.keys(
agrupado
)

.sort((a,b)=>{

return agrupado[a][0].stop-
agrupado[b][0].stop

})

.forEach(rua=>{

const ruaDiv=
document.createElement(
"div"
);

ruaDiv.className=
"rua";

ruaDiv.innerHTML=`

<div class=titulo>

${rua}

</div>

<div class=parada>

Parada
${agrupado[rua][0].stop}

</div>

<div class=grid>

</div>

`;

const grid=
ruaDiv.querySelector(
".grid"
);

const casas={};

agrupado[rua]

.forEach(item=>{

if(
!casas[item.numero]
){

casas[
item.numero
]=[];

}

casas[
item.numero
]

.push(item);

});


Object.keys(casas)

.sort(
(a,b)=>

(parseInt(a)||0)
-
(parseInt(b)||0)

)

.forEach(numero=>{

const itens=
casas[numero];

const card=
document.createElement(
"div"
);

card.className=
"card";

card.dataset.qtd=
itens.length;

card.style.gridColumn=
`span ${
Math.min(
itens.length,
4
)
}`;

let enderecoCompleto=
rua+
","+
numero;

let html=`

<div class=numero>

${numero}

</div>

<div class=obs>

${itens[0]
.observacao||""}

</div>

<div
class=pacotes
style="
grid-template-columns:
repeat(
${Math.min(
itens.length,
4
)},
1fr
);
"
>

`;

itens.forEach(item=>{

html+=`

<div class=pacote>

<b>
Pac
${item.sequence}
</b>

<br><br>

${item.complemento||""}

</div>

`;

});

html+=`

</div>

<input
class=check
type=checkbox
${itens.every(
x=>
x.status==="Entregue"
)
?"checked":""}
>

`;

card.innerHTML=
html;

const obsDiv=
card.querySelector(
".obs"
);

card.addEventListener(
"dblclick",
()=>{

const textoAtual=
obsDiv.innerText;

obsDiv.innerHTML=`

<input
id=tempObs
style="
width:100%;
padding:8px;
border-radius:8px;
border:1px solid #ddd;
"
value="${textoAtual}"
>

`;

const input=
document.getElementById(
"tempObs"
);

input.focus();

input.addEventListener(
"keypress",
async e=>{

if(
e.key==="Enter"
){

const texto=
input.value;

obsDiv.innerText=
texto;

await fetch(

API_URL+
"?action=obs",

{

method:"POST",

body:
JSON.stringify({

endereco:
enderecoCompleto,

obs:texto

})

}

);

}

}

);

});

const check=
card.querySelector(
".check"
);

if(
check.checked
){

card.classList.add(
"concluida"
);

}

check.addEventListener(
"change",
async()=>{

if(!check.checked){

const confirmar=
confirm(
"Deseja realmente desfazer esta entrega?"
);

if(!confirmar){

check.checked=true;
return;

}

}

await Promise.all(

itens.map(
item=>

fetch(
API_URL,
{

method:"POST",

body:
JSON.stringify({

sequence:
item.sequence,

entregue:
check.checked

})

}

)

)

);

card.classList.toggle(
"concluida",
check.checked
);

const total=
ruaDiv.querySelectorAll(
".check"
);

const marcados=
ruaDiv.querySelectorAll(
".check:checked"
);

ruaDiv.classList.toggle(
"finalizada",
total.length===marcados.length
);

atualizarStatus();

}

);

grid.appendChild(
card
);

});

app.appendChild(
ruaDiv
);

});

atualizarStatus();

}



function atualizarStatus(){

let total=0;
let entregues=0;

document
.querySelectorAll(
".card"
)

.forEach(card=>{

const qtd=
parseInt(
card.dataset.qtd
)||1;

total+=qtd;

if(
card.querySelector(
".check"
).checked
){

entregues+=qtd;

}

});

document
.getElementById(
"entregues"
)
.innerText=
entregues;

document
.getElementById(
"pendentes"
)
.innerText=
total-entregues;

}



const busca=
document.getElementById(
"busca"
);

const abrir=
document.getElementById(
"abrirPesquisa"
);

const sugestoes=
document.getElementById(
"sugestoes"
);

abrir.onclick=()=>{

const visivel=
getComputedStyle(
busca
).display;

busca.style.display=

visivel==="none"
?"block"
:"none";

if(
busca.style.display==="block"
){

busca.focus();

}

};


busca.addEventListener(
"input",
()=>{

const termo=
busca.value
.toLowerCase();

sugestoes.innerHTML="";

if(!termo){

sugestoes.style.display=
"none";

return;

}

lista

.filter(x=>

x.texto
.toLowerCase()
.includes(
termo
)

)

.slice(0,10)

.forEach(x=>{

const div=
document.createElement(
"div"
);

div.className=
"sugestao";

div.innerText=
x.texto;

div.onclick=()=>{

buscar(x.item);

};

sugestoes.appendChild(
div
);

});

sugestoes.style.display=
"block";

});


function buscar(item){

document
.querySelectorAll(
".rua"
)

.forEach(card=>{

if(

card.innerText
.includes(
item.rua
)

){

card.scrollIntoView({

behavior:
"smooth",

block:
"center"

});

card.style.boxShadow=

"0 0 20px #4caf50";

setTimeout(()=>{

card.style.boxShadow=
"";

},2000);

}

});

sugestoes.style.display=
"none";

}


busca.addEventListener(
"keypress",
e=>{

if(
e.key==="Enter"
){

const primeiro=
lista.find(x=>

x.texto
.toLowerCase()
.includes(
busca.value
.toLowerCase()
)

);

if(primeiro){

buscar(
primeiro.item
);

}

}

});



setInterval(
atualizarTempoReal,
3000
);


async function atualizarTempoReal(){

try{

const response=
await fetch(
API_URL+
"?t="+Date.now()
);

const novosDados=
await response.json();

const estadoAtual=
JSON.stringify(

novosDados.map(x=>({

sequence:x.sequence,
status:x.status,
observacao:x.observacao

}))

);


if(
estadoAtual!==ultimoEstado
){

const scrollAtual=
window.scrollY;

dados=novosDados;

await carregarDados();

window.scrollTo({

top:scrollAtual

});

}

}catch(e){

console.log(e);

}

}


carregarDados();

</script>

</body>

</html>
