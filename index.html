<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ruas da Rota</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f5f5f5;
      padding:12px;
      color:#222;
    }

  .rua{

background:#fff;
padding:16px;
border-radius:16px;
margin-bottom:20px;

box-shadow:
0 2px 10px rgba(0,0,0,.08);

}

.titulo-rua{

font-size:20px;
font-weight:bold;
margin-bottom:5px;

}

.parada{

font-size:14px;
color:#666;
margin-bottom:15px;

}

.grid{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:10px;

}

@media(max-width:700px){

.grid{

grid-template-columns:
repeat(2,1fr);

}

}

.pacote-card{

padding:12px;

border-radius:12px;

background:#f7f7f7;

border:1px solid #ddd;

transition:.3s;

}

.pacote-card.concluida{

background:#dff7df;
border-color:#4caf50;

}

.numero{

font-size:22px;
font-weight:bold;

}

.pacote{

margin-top:6px;
font-weight:bold;

}

.complemento{

font-size:13px;
color:#666;
margin-top:8px;

}

.check{

margin-top:10px;
width:22px;
height:22px;

cursor:pointer;

}

.finalizada{

background:#dff7df;

}

.finalizada .titulo-rua{

text-decoration:line-through;
color:#2e7d32;

}
.topo{

position:sticky;

top:0;

z-index:999;

background:white;

padding:10px;

margin-bottom:15px;

border-radius:16px;

box-shadow:
0 2px 10px rgba(0,0,0,.1);

}

.status{

display:flex;
gap:10px;

margin-bottom:10px;

}

.box-status{

flex:1;

text-align:center;

padding:8px;

background:#f5f5f5;

border-radius:12px;

}

.box-status div{

font-size:25px;
font-weight:bold;

}

.pesquisa{

display:flex;
gap:10px;

}

#busca{

display:none;

flex:1;

padding:10px;

border:1px solid #ddd;

border-radius:12px;

}

#abrirPesquisa{

border:none;

background:#4caf50;

color:white;

border-radius:12px;

padding:10px;

font-size:20px;

cursor:pointer;

}
    
  </style>
</head>

<body>

  <div class="topo">

<div class="status">

<div class="box-status">
<div id="entregues">0</div>
<small>Entregues</small>
</div>

<div class="box-status">
<div id="pendentes">0</div>
<small>Pendentes</small>
</div>

</div>

<div class="pesquisa">

<button id="abrirPesquisa">

🔍

</button>

<input
type="text"
id="busca"
placeholder="Rua, número ou pacote..."
list="sugestoes"
>

<datalist id="sugestoes"></datalist>

</div>

</div>

<div id="app"></div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwQqDh-WiG_-EHlSrL-v00dvmnd06opKj9Dns7nlCTNn-jgVfhlXIgTwakURHUZHRlegA/exec";

async function carregarDados(){

try{

const response=await fetch(API_URL);

const dados=await response.json();

const app=document.getElementById("app");

app.innerHTML="";

const agrupado={};

// agrupar ruas
dados.forEach(item=>{

if(!agrupado[item.rua]){
agrupado[item.rua]=[];
}

agrupado[item.rua].push(item);

});


// ordenar ruas pela menor sequence
const ruasOrdenadas=Object.keys(agrupado)
.sort((a,b)=>{

return agrupado[a][0].sequence-
agrupado[b][0].sequence

});

ruasOrdenadas.forEach(nomeRua=>{

const ruaDiv=document.createElement("div");

ruaDiv.className="rua";

const parada=
agrupado[nomeRua][0].stop;

ruaDiv.innerHTML=`

<div class="titulo-rua">
${nomeRua}
</div>

<div class="parada">
Parada ${parada}
</div>

<div class="grid"></div>

`;

const grid=
ruaDiv.querySelector(".grid");

agrupado[nomeRua]

.sort((a,b)=>{

const n1=parseInt(a.numero)||0;
const n2=parseInt(b.numero)||0;

return n1-n2;

})

.forEach(item=>{

const card=
document.createElement("div");

card.className=
"pacote-card";

card.innerHTML=`

<div class="pacote">
Pacote ${item.sequence}
</div>

<div class="numero">
${item.numero||"-"}
</div>

<div class="complemento">
${item.complemento||""}
</div>

<input
type="checkbox"
class="check"
>

`;

const checkbox=
card.querySelector(".check");

checkbox.addEventListener(
"change",
()=>{

card.classList.toggle(
"concluida"
);

const total=
ruaDiv.querySelectorAll(".check");

const marcados=
ruaDiv.querySelectorAll(
".check:checked"
);

if(
total.length===
marcados.length
){

ruaDiv.classList.add(
"finalizada"
);

}else{

ruaDiv.classList.remove(
"finalizada"
);

}

}
);

grid.appendChild(card);

});

app.appendChild(ruaDiv);

});

}catch(erro){

document.body.innerHTML=
`Erro: ${erro}`;

}

}

carregarDados();

  const busca=
document.getElementById("busca");

const abrir=
document.getElementById(
"abrirPesquisa"
);

abrir.onclick=()=>{

busca.style.display=
busca.style.display==="block"
?"none"
:"block";

}


const sugestoes=
document.getElementById(
"sugestoes"
);

dados.forEach(item=>{

[
item.rua,
item.numero,
item.sequence
]

.forEach(valor=>{

if(!valor)return;

const option=
document.createElement(
"option"
);

option.value=valor;

sugestoes.appendChild(
option
);

})

});


busca.addEventListener(
"input",
()=>{

const termo=
busca.value.toLowerCase();

document
.querySelectorAll(".rua")

.forEach(rua=>{

const texto=
rua.innerText
.toLowerCase();

rua.style.display=

texto.includes(termo)
?"block"
:"none";

})

}

);


function atualizarStatus(){

const total=
document.querySelectorAll(
".check"
).length;

const entregues=
document.querySelectorAll(
".check:checked"
).length;

document
.getElementById(
"entregues"
)
.innerText=
entregues;

document
.getElementById(
"pendentes"
)
.innerText=
total-entregues;

}

document
.addEventListener(
"change",
atualizarStatus
);

atualizarStatus();

</script>
</body>
</html>
